version: '3.8'

services:
  web:
    image: lasso:v1.0.0
    build:
      context: ./
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    environment:
      - PORT=${CONTAINER_SERVER_PORT}
    volumes:
      - .:/var/www/html
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
